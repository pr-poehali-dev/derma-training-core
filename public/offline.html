<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DermaMed Trainer — Офлайн</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 2rem; }
    .icon { width: 80px; height: 80px; margin: 0 auto 1.5rem; background: rgba(16,185,129,0.15); border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: rgba(255,255,255,0.5); font-size: 0.9rem; max-width: 320px; margin: 0 auto 1.5rem; }
    button { background: #10b981; color: #fff; border: none; padding: 0.75rem 2rem; border-radius: 0.75rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🩺</div>
    <h1>Нет подключения к сети</h1>
    <p>Проверьте интернет-соединение и попробуйте снова</p>
    <button onclick="location.reload()">Обновить</button>
  </div>
</body>
</html>
